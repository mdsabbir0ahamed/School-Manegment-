    # ── DASHBOARD ─────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalStudents:
          type: integer
        activeStudents:
          type: integer
        totalTeachers:
          type: integer
        totalClasses:
          type: integer
        todayAttendanceRate:
          type: number
        monthlyRevenue:
          type: number
        pendingInvoices:
          type: integer
        overdueInvoices:
          type: integer
        newAdmissionsThisMonth:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalStudents
        - activeStudents
        - totalTeachers
        - totalClasses
        - todayAttendanceRate
        - monthlyRevenue
        - pendingInvoices
        - overdueInvoices
        - newAdmissionsThisMonth
        - totalRevenue

    AttendanceSummary:
      type: object
      properties:
        date:
          type: string
          format: date
        summary:
          type: array
          items:
            type: object
            properties:
              classId:
                type: integer
              className:
                type: string
              total:
                type: integer
              present:
                type: integer
              absent:
                type: integer
              late:
                type: integer
              rate:
                type: number
            required:
              - classId
              - className
              - total
              - present
              - absent
              - late
              - rate
        overall:
          type: object
          properties:
            total:
              type: integer
            present:
              type: integer
            rate:
              type: number
          required:
            - total
            - present
            - rate
      required:
        - date
        - summary
        - overall

    RevenueTrend:
      type: object
      properties:
        months:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              collected:
                type: number
              pending:
                type: number
            required:
              - month
              - collected
              - pending
      required:
        - months

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [ADMISSION, PAYMENT, ATTENDANCE, USER_CREATED]
        description:
          type: string
        entityName:
          type: string
        amount:
          type: number
          nullable: true
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - description
        - entityName
        - timestamp

    RecentActivity:
      type: object
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - activities
